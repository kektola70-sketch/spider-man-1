<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spider-Man PC Ultra</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 20px; border-left: 5px solid #f00; z-index: 100; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0; color:#f00;">SPIDER-MAN: NEXT GEN</h2>
        <b>WASD</b> — Движение / Ползание по стене<br>
        <b>SPACE</b> — Прыжок / Отскок от стены<br>
        <b>ЛКМ</b> — Паутина (удерживать)
    </div>
    <div id="crosshair"></div>

    <script>
        const THREE = require('three');

        let scene, camera, renderer, player, webLine;
        let buildings = [];
        let velocity = new THREE.Vector3();
        let keys = {};
        let yaw = 0, pitch = 0;
        let isSwinging = false, swingPoint = new THREE.Vector3();
        let isOnWall = false, wallNormal = new THREE.Vector3();

        const raycaster = new THREE.Raycaster();
        const GRAVITY = -0.008;
        const FRICTION = 0.97;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.006);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Освещение
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const sun = new THREE.DirectionalLight(0x5555ff, 1);
            sun.position.set(100, 200, 50);
            scene.add(sun);

            createUltraCity();
            createSpiderModel();

            // Паутина
            webLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
                new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 })
            );
            webLine.visible = false;
            scene.add(webLine);

            // Управление
            document.addEventListener('mousedown', () => { 
                if(document.pointerLockElement) isSwinging = true; else document.body.requestPointerLock(); 
            });
            document.addEventListener('mouseup', () => { isSwinging = false; webLine.visible = false; });
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement){
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });
        }

        function createUltraCity() {
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            
            for (let i = 0; i < 300; i++) {
                const h = Math.random() * 80 + 20;
                const w = Math.random() * 10 + 10;
                const posX = (Math.random() - 0.5) * 800;
                const posZ = (Math.random() - 0.5) * 800;

                // Основное здание
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#111'; ctx.fillRect(0,0,128,128);
                ctx.fillStyle = Math.random() > 0.5 ? '#00eeff' : '#ffaa00';
                for(let y=0; y<10; y++) for(let x=0; x<5; x++) if(Math.random()>0.4) ctx.fillRect(x*25+5, y*12+5, 15, 8);
                
                const winTex = new THREE.CanvasTexture(canvas);
                winTex.wrapS = winTex.wrapT = THREE.RepeatWrapping;
                winTex.repeat.set(1, h/10);

                const b = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({ map: winTex, emissive: 0x222222 }));
                b.position.set(posX, h/2, posZ);
                b.scale.set(w, h, w);
                
                // Добавляем крышу
                const roof = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({ color: 0x050505 }));
                roof.scale.set(w+0.5, 2, w+0.5);
                roof.position.set(posX, h, posZ);
                
                scene.add(b);
                scene.add(roof);
                
                buildings.push(b, roof);
            }
        }

        function createSpiderModel() {
            player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xaa0000 }));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xaa0000 }));
            head.position.y = 0.8;
            player.add(body, head);
            player.position.y = 100;
            scene.add(player);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Рефреш состояния стены
            isOnWall = false;

            // 1. Raycasting для коллизий (Стены и Крыши)
            const rayDirs = [
                new THREE.Vector3(0, -1, 0), // Пол
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0), // Стены
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1)
            ];

            raycaster.far = 1.5;
            for(let dir of rayDirs) {
                raycaster.set(player.position, dir);
                const intersects = raycaster.intersectObjects(buildings);
                if(intersects.length > 0) {
                    if(dir.y === -1) { // Мы на крыше
                        if(velocity.y < 0) {
                            player.position.y = intersects[0].point.y + 1.2;
                            velocity.y = 0;
                        }
                    } else { // Мы у стены
                        isOnWall = true;
                        wallNormal.copy(dir).negate();
                    }
                }
            }

            // 2. Логика паутины
            if(isSwinging) {
                if(!webLine.visible) {
                    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                    raycaster.far = 400;
                    const hits = raycaster.intersectObjects(buildings);
                    if(hits.length > 0) {
                        swingPoint.copy(hits[0].point);
                        webLine.visible = true;
                    }
                }
                if(webLine.visible) {
                    const d = new THREE.Vector3().subVectors(swingPoint, player.position).normalize();
                    velocity.add(d.multiplyScalar(0.015));
                    const pos = webLine.geometry.attributes.position.array;
                    pos[0]=player.position.x; pos[1]=player.position.y; pos[2]=player.position.z;
                    pos[3]=swingPoint.x; pos[4]=swingPoint.y; pos[5]=swingPoint.z;
                    webLine.geometry.attributes.position.needsUpdate = true;
                }
            }

            // 3. Управление
            if(isOnWall) {
                velocity.y *= 0.8; // Замедление падения на стене
                const climbSpeed = 0.1;
                if(keys['KeyW']) velocity.y = climbSpeed;
                if(keys['KeyS']) velocity.y = -climbSpeed;
                
                // Движение влево-вправо по стене (через кросс-вектор)
                const right = new THREE.Vector3(0,1,0).cross(wallNormal).normalize();
                if(keys['KeyA']) player.position.add(right.multiplyScalar(climbSpeed));
                if(keys['KeyD']) player.position.add(right.multiplyScalar(-climbSpeed));

                if(keys['Space']) { // Отскок от стены
                    velocity.copy(wallNormal).multiplyScalar(0.4);
                    velocity.y = 0.3;
                    isOnWall = false;
                }
            } else {
                velocity.y += GRAVITY;
                const moveSpeed = 0.005;
                if (keys['KeyW']) { velocity.z -= moveSpeed * Math.cos(yaw); velocity.x -= moveSpeed * Math.sin(yaw); }
                if (keys['KeyS']) { velocity.z += moveSpeed * Math.cos(yaw); velocity.x += moveSpeed * Math.sin(yaw); }
                if (keys['KeyA']) { velocity.x -= moveSpeed * Math.cos(yaw); velocity.z += moveSpeed * Math.sin(yaw); }
                if (keys['KeyD']) { velocity.x += moveSpeed * Math.cos(yaw); velocity.z -= moveSpeed * Math.sin(yaw); }
                if (keys['Space'] && player.position.y < 1.5) velocity.y = 0.25;
            }

            velocity.multiplyScalar(FRICTION);
            player.position.add(velocity);

            // Обновление камеры
            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.copy(player.position);
            camera.translateZ(15); camera.translateY(5);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
