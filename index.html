<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spider-Man PC Realism</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-left: 5px solid #f00; border-radius: 5px; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="ui">
        <h3 style="margin:0; color:#ff3333;">SPIDER-MAN: REALISM</h3>
        <b>ЛКМ</b> — Выпустить паутину<br>
        <b>WASD</b> — Раскачивание<br>
        <b>Space</b> — Прыжок
    </div>
    <div id="crosshair"></div>

    <script src="three.min.js"></script>

    <script>
        let scene, camera, renderer, player, buildings = [], velocity = new THREE.Vector3(), keys = {}, isSwinging = false, swingPoint = new THREE.Vector3(), webLine;
        const raycaster = new THREE.Raycaster();
        let yaw = 0, pitch = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Добавляем звезды (реализм неба)
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<5000; i++) {
                starCoords.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.7});
            scene.add(new THREE.Points(starGeo, starMat));

            scene.add(new THREE.AmbientLight(0x404040, 2));
            const moonLight = new THREE.DirectionalLight(0x5555ff, 1);
            moonLight.position.set(100, 200, 100);
            scene.add(moonLight);

            // Создаем реалистичный город
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 200; i++) {
                const h = Math.random() * 80 + 20;
                const w = Math.random() * 10 + 5;
                
                // Текстура светящихся окон
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#050505'; ctx.fillRect(0,0,64,64);
                ctx.fillStyle = '#ffdf00';
                for(let row=0; row<4; row++) {
                    for(let col=0; col<4; col++) {
                        if(Math.random() > 0.6) ctx.fillRect(col*15+5, row*15+5, 10, 10);
                    }
                }
                const winTex = new THREE.CanvasTexture(canvas);
                winTex.wrapS = winTex.wrapT = THREE.RepeatWrapping;
                winTex.repeat.set(2, h/10);

                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x111111, 
                    map: winTex,
                    emissive: new THREE.Color(0xffffff),
                    emissiveMap: winTex,
                    emissiveIntensity: 0.5
                });

                const b = new THREE.Mesh(boxGeo, mat);
                b.position.set((Math.random()-0.5)*600, h/2, (Math.random()-0.5)*600);
                b.scale.set(w, h, w);
                scene.add(b);
                buildings.push(b);
            }

            // Игрок
            player = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.5, 1, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.7, roughness: 0.2 })
            );
            player.position.y = 80;
            scene.add(player);

            // Линия паутины (светящаяся)
            webLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
                new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 })
            );
            webLine.visible = false;
            scene.add(webLine);

            // Управление
            document.addEventListener('mousedown', (e) => { 
                if(document.pointerLockElement) startSwing(); 
                else document.body.requestPointerLock(); 
            });
            document.addEventListener('mouseup', () => { isSwinging = false; webLine.visible = false; });
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement){
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });
        }

        function startSwing() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(buildings);
            if(hits.length > 0) {
                swingPoint = hits[0].point;
                isSwinging = true;
                webLine.visible = true;
                velocity.y += 0.15;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if(isSwinging) {
                const dist = player.position.distanceTo(swingPoint);
                const dir = new THREE.Vector3().subVectors(swingPoint, player.position).normalize();
                velocity.add(dir.multiplyScalar(0.012));
                
                const pos = webLine.geometry.attributes.position.array;
                pos[0]=player.position.x; pos[1]=player.position.y; pos[2]=player.position.z;
                pos[3]=swingPoint.x; pos[4]=swingPoint.y; pos[5]=swingPoint.z;
                webLine.geometry.attributes.position.needsUpdate = true;
            }

            velocity.y -= 0.007; // Гравитация
            velocity.multiplyScalar(0.99); // Сопротивление воздуха
            player.position.add(velocity);

            if(player.position.y < 1) {
                player.position.y = 1;
                velocity.set(0,0,0);
            }

            // Камера
            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.copy(player.position);
            camera.translateZ(15);
            camera.translateY(5);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
