<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spider-Man PC Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-left: 5px solid #f00; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="ui">
        <b>ЛКМ</b> — Паутина (удерживать)<br>
        <b>WASD</b> — Движение<br>
        <b>Space</b> — Прыжок
    </div>
    <div id="crosshair"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, buildings = [], velocity = new THREE.Vector3(), keys = {}, isSwinging = false, swingPoint = new THREE.Vector3(), webLine;
        const raycaster = new THREE.Raycaster();
        let yaw = 0, pitch = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.015);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(50, 100, 50);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 1.5));

            // Город
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 100; i++) {
                const h = Math.random() * 50 + 10, w = Math.random() * 5 + 5;
                const mat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const b = new THREE.Mesh(boxGeo, mat);
                b.position.set((Math.random()-0.5)*300, h/2, (Math.random()-0.5)*300);
                b.scale.set(w, h, w);
                b.castShadow = b.receiveShadow = true;
                scene.add(b); buildings.push(b);
            }

            // Игрок
            player = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            player.position.y = 20;
            scene.add(player);

            // Линия паутины
            webLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]), new THREE.LineBasicMaterial({ color: 0xffffff }));
            webLine.visible = false;
            scene.add(webLine);

            document.addEventListener('mousedown', () => { if(document.pointerLockElement) startSwing(); else document.body.requestPointerLock(); });
            document.addEventListener('mouseup', () => { isSwinging = false; webLine.visible = false; });
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousemove', (e) => { if(document.pointerLockElement){ yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); } });
        }

        function startSwing() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(buildings);
            if(hits.length > 0) { swingPoint = hits[0].point; isSwinging = true; webLine.visible = true; velocity.y += 0.1; }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isSwinging) {
                const dir = new THREE.Vector3().subVectors(swingPoint, player.position).normalize();
                velocity.add(dir.multiplyScalar(0.01));
                const pos = webLine.geometry.attributes.position.array;
                pos[0]=player.position.x; pos[1]=player.position.y; pos[2]=player.position.z;
                pos[3]=swingPoint.x; pos[4]=swingPoint.y; pos[5]=swingPoint.z;
                webLine.geometry.attributes.position.needsUpdate = true;
            }
            velocity.y -= 0.006; // Гравитация
            velocity.multiplyScalar(0.98); // Трение
            player.position.add(velocity);
            if(player.position.y < 1) { player.position.y = 1; velocity.y = 0; }

            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.copy(player.position);
            camera.translateZ(10); camera.translateY(3);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
