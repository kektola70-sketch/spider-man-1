<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spider-Man Web Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif;
            background: rgba(0,0,0,0.7); padding: 15px;
            border-radius: 8px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <b>Управление:</b><br>
        WASD - Движение<br>
        Мышь - Вращение камеры (зажми правую кнопку)<br>
        Пробел - Прыжок
    </div>

    <!-- Загружаем Three.js через обычный скрипт (Global build) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        // Проверяем, загрузилась ли библиотека
        window.onload = function() {
            if (typeof THREE === 'undefined') {
                alert("Ошибка: Не удалось загрузить Three.js. Проверь интернет!");
                return;
            }

            // 1. Сцена
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Голубое небо
            scene.fog = new THREE.Fog(0x87CEEB, 20, 100); // Туман для производительности

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. Свет
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 3. Пол (земля)
            const groundGeo = new THREE.PlaneGeometry(1000, 1000);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 4. Создаем город
            const buildings = [];
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 60; i++) {
                const color = Math.random() > 0.5 ? 0x666666 : 0x444444;
                const mat = new THREE.MeshPhongMaterial({ color: color });
                const b = new THREE.Mesh(boxGeo, mat);
                
                b.position.x = (Math.random() - 0.5) * 100;
                b.position.z = (Math.random() - 0.5) * 100;
                
                const h = Math.random() * 15 + 5;
                b.scale.set(4, h, 4);
                b.position.y = h / 2;
                scene.add(b);
                buildings.push(b);
            }

            // 5. Игрок
            const playerGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
            const playerMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 1.5;
            scene.add(player);

            camera.position.set(0, 5, 10);

            // Управление
            const keys = {};
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);

            // 6. Анимация
            function animate() {
                requestAnimationFrame(animate);

                // Движение игрока
                const speed = 0.15;
                if (keys['KeyW']) player.position.z -= speed;
                if (keys['KeyS']) player.position.z += speed;
                if (keys['KeyA']) player.position.x -= speed;
                if (keys['KeyD']) player.position.x += speed;

                // Камера плавно следует за игроком
                const targetCamPos = new THREE.Vector3(
                    player.position.x, 
                    player.position.y + 4, 
                    player.position.z + 8
                );
                camera.position.lerp(targetCamPos, 0.1);
                camera.lookAt(player.position);

                renderer.render(scene, camera);
            }

            animate();

            // Ресайз окна
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
