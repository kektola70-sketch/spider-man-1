<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spider-Man PC Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 20px; border-left: 5px solid #f00; border-radius: 4px; z-index: 100; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 100; opacity: 0.7; }
        #error-msg { position: absolute; top: 10px; right: 10px; color: red; background: rgba(0,0,0,0.7); display: none; padding: 10px; }
    </style>
</head>
<body>
    <div id="error-msg"></div>
    <div id="ui">
        <h2 style="margin:0 0 10px 0; color: #ff3333;">SPIDER-MAN: WEB PC</h2>
        <b>ЛКМ</b> — Выпустить паутину (удерживать)<br>
        <b>W, A, S, D</b> — Движение / Раскачивание<br>
        <b>SPACE</b> — Прыжок / Рывок вверх<br>
        <b>CLICK</b> — Захват мыши (начать игру)
    </div>
    <div id="crosshair"></div>

    <script>
        // Подключаем движок Three.js через Electron require
        const THREE = require('three');

        let scene, camera, renderer, player, buildings = [];
        let velocity = new THREE.Vector3(0, 0, 0);
        let keys = {};
        let isSwinging = false;
        let swingPoint = new THREE.Vector3();
        let webLine;
        let raycaster = new THREE.Raycaster();
        let yaw = 0, pitch = 0;

        // Физические константы
        const GRAVITY = -0.007;
        const FRICTION = 0.985;
        const SWING_FORCE = 0.012;

        try {
            init();
            animate();
        } catch (err) {
            const errDiv = document.getElementById('error-msg');
            errDiv.style.display = 'block';
            errDiv.innerHTML = "Ошибка: " + err.message;
        }

        function init() {
            // 1. Сцена
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.01);

            // 2. Камера
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // 3. Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 4. Свет
            scene.add(new THREE.AmbientLight(0x404040, 2));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(50, 100, 50);
            scene.add(light);

            // 5. Город
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 150; i++) {
                const h = Math.random() * 50 + 15;
                const w = Math.random() * 8 + 4;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x1a1a1a,
                    roughness: 0.3,
                    metalness: 0.7
                });
                const b = new THREE.Mesh(boxGeo, mat);
                b.position.set((Math.random() - 0.5) * 400, h / 2, (Math.random() - 0.5) * 400);
                b.scale.set(w, h, w);
                b.castShadow = true;
                b.receiveShadow = true;
                scene.add(b);
                buildings.push(b);
            }

            // 6. Игрок
            const playerGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.5 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 50;
            scene.add(player);

            // 7. Паутина
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            webLine = new THREE.Line(lineGeo, lineMat);
            webLine.visible = false;
            scene.add(webLine);

            // Управление
            document.addEventListener('mousedown', () => {
                if (document.pointerLockElement !== document.body) {
                    document.body.requestPointerLock();
                } else {
                    startSwing();
                }
            });
            document.addEventListener('mouseup', stopSwing);
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });
        }

        function startSwing() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(buildings);
            if (hits.length > 0) {
                swingPoint = hits[0].point;
                isSwinging = true;
                webLine.visible = true;
                velocity.y += 0.1; // Рывок при зацепе
            }
        }

        function stopSwing() {
            isSwinging = false;
            webLine.visible = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isSwinging) {
                // Тяга к точке зацепа
                const dir = new THREE.Vector3().subVectors(swingPoint, player.position).normalize();
                velocity.add(dir.multiplyScalar(SWING_FORCE));

                // Отрисовка нити
                const pos = webLine.geometry.attributes.position.array;
                pos[0] = player.position.x; pos[1] = player.position.y; pos[2] = player.position.z;
                pos[3] = swingPoint.x; pos[4] = swingPoint.y; pos[5] = swingPoint.z;
                webLine.geometry.attributes.position.needsUpdate = true;
            }

            // Гравитация и инерция
            velocity.y += GRAVITY;
            velocity.multiplyScalar(FRICTION);
            player.position.add(velocity);

            // Пол
            if (player.position.y < 1) {
                player.position.y = 1;
                velocity.y = 0;
            }

            // Управление в воздухе
            const speed = 0.005;
            if (keys['KeyW']) velocity.z -= speed * Math.cos(yaw);
            if (keys['KeyW']) velocity.x -= speed * Math.sin(yaw);
            if (keys['KeyS']) velocity.z += speed * Math.cos(yaw);
            if (keys['KeyS']) velocity.x += speed * Math.sin(yaw);
            if (keys['Space'] && player.position.y < 1.5) velocity.y = 0.2;

            // Обновление камеры
            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.copy(player.position);
            camera.translateZ(12);
            camera.translateY(4);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
