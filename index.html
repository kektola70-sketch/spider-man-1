<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spider-Man Realism Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid #f00; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Spider-Man: Web Project</b><br>
        ЛКМ — Выпустить паутину (удерживать)<br>
        Пробел — Прыжок / Рывок вверх<br>
        WASD — Раскачивание и ходьба
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, buildings = [];
        let velocity = new THREE.Vector3();
        let isSwinging = false;
        let swingPoint = new THREE.Vector3();
        let swingLine;
        let raycaster = new THREE.Raycaster();
        let keys = {};

        const GRAVITY = -0.008;
        const FRICTION = 0.98;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122); // Ночной город для реализма
            scene.fog = new THREE.Fog(0x111122, 10, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Тени!
            document.body.appendChild(renderer.domElement);

            // Освещение
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(50, 100, 50);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            // Город с "реалистичными" материалами
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000),
                new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            for (let i = 0; i < 100; i++) {
                const h = Math.random() * 30 + 10;
                const w = Math.random() * 5 + 3;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x222222, 
                    roughness: 0.2, 
                    metalness: 0.5 
                });
                const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat);
                b.position.set((Math.random() - 0.5) * 200, h / 2, (Math.random() - 0.5) * 200);
                b.castShadow = true;
                b.receiveShadow = true;
                scene.add(b);
                buildings.push(b);
            }

            // Игрок
            player = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 0.8, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.5 })
            );
            player.position.y = 10;
            player.castShadow = true;
            scene.add(player);

            // Линия паутины
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            swingLine = new THREE.Line(lineGeo, lineMat);
            swingLine.visible = false;
            scene.add(swingLine);

            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousedown', startSwing);
            document.addEventListener('mouseup', stopSwing);
        }

        function startSwing() {
            // Пускаем луч вперед из камеры
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(buildings);

            if (intersects.length > 0) {
                swingPoint = intersects[0].point;
                isSwinging = true;
                swingLine.visible = true;
            }
        }

        function stopSwing() {
            isSwinging = false;
            swingLine.visible = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Логика физики
            if (isSwinging) {
                // Математика маятника (упрощенная)
                let swingDir = new THREE.Vector3().subVectors(swingPoint, player.position).normalize();
                velocity.add(swingDir.multiplyScalar(0.015)); // Тяга к точке зацепа
                
                // Рисуем паутину
                const positions = swingLine.geometry.attributes.position.array;
                positions[0] = player.position.x;
                positions[1] = player.position.y;
                positions[2] = player.position.z;
                positions[3] = swingPoint.x;
                positions[4] = swingPoint.y;
                positions[5] = swingPoint.z;
                swingLine.geometry.attributes.position.needsUpdate = true;
            } else {
                velocity.y += GRAVITY; // Падение
            }

            // Управление в воздухе/на земле
            if (keys['KeyW']) velocity.z -= 0.005;
            if (keys['KeyS']) velocity.z += 0.005;
            if (keys['KeyA']) velocity.x -= 0.005;
            if (keys['KeyD']) velocity.x += 0.005;
            if (keys['Space'] && player.position.y < 1) velocity.y = 0.2; // Прыжок

            // Применяем скорость
            velocity.multiplyScalar(FRICTION); // Сопротивление воздуха
            player.position.add(velocity);

            // Коллизия с землей
            if (player.position.y < 0.8) {
                player.position.y = 0.8;
                velocity.y = 0;
            }

            // Камера за игроком (Third Person)
            const camOffset = new THREE.Vector3(0, 5, 12).applyQuaternion(player.quaternion);
            camera.position.lerp(player.position.clone().add(camOffset), 0.1);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
